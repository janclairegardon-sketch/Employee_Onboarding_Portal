<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">


<div class="container" style="max-width: 450px;">
    
    <!-- Simple Error Display Box -->
    <div id="errorAlert" class="alert alert-danger d-none py-2 mb-3"></div>


    <div class="card shadow-sm">
        <div class="card-body p-4">


            <!-- ================= PHASE 1 ================= -->
            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary">First Name</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
            </div>

            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary">Middle Name</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
            </div>

            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary">Surname</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
            </div>

            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary">Extension Name</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
            </div>

            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary">Age</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
            </div>

        <div class="col-md-6">
            <h3 class="h6 mb-3 fw-bold text-primary">Date of Birth</h3>
            <input type="date" class="form-control mb-3" required>
        </div>

            <div class="col-md-6">
                <h3 class="h6 mb-3 fw-bold text-primary">Gender</h3>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>

            <a href="#phaseTwo" id="btnGoToTwo" class="btn btn-primary w-100 fw-bold">Next Step</a>


            <!-- ================= PHASE 2 ================= -->
            <div id="phaseTwo" class="d-none">
                <h3 class="h6 mb-3 fw-bold text-primary">STEP 2: EMAIL</h3>
                <input type="text" id="userEmail" class="form-control mb-3" placeholder="Enter email address">
                
                <a href="#phaseThree" id="btnGoToThree" class="btn btn-success w-100 fw-bold">Finish Setup</a>
            </div>


            <!-- ================= PHASE 3 ================= -->
            <div id="phaseThree" class="d-none">
                <h3 class="h6 mb-3 fw-bold text-success">STEP 3: PROFILE</h3>
                <div class="bg-light p-3 border rounded mb-3 font-monospace">
                    <p class="mb-1"><strong>User:</strong> <span id="outUser">--</span></p>
                    <p class="mb-0"><strong>Email:</strong> <span id="outEmail">--</span></p>
                </div>
                
                <a href="#phaseOne" id="btnReset" class="btn btn-outline-secondary w-100 fw-bold">Restart</a>
            </div>


        </div>
    </div>
</div>

</body>
</html>
